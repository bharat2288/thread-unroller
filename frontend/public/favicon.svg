<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Thread unrolling from spool - hand-drawn style -->
  <circle cx="10" cy="10" r="6" stroke="#d4a574" stroke-width="2" fill="none"/>
  <circle cx="10" cy="10" r="2.5" fill="#d4a574"/>
  <!-- Unrolling thread path - wavy, organic -->
  <path d="M16 10 Q20 8, 22 12 Q24 18, 20 22 Q16 26, 22 28"
        stroke="#d4a574"
        stroke-width="2"
        stroke-linecap="round"
        fill="none"/>
  <!-- Small nodes on thread like tweets -->
  <circle cx="22" cy="12" r="1.5" fill="#d4a574"/>
  <circle cx="20" cy="22" r="1.5" fill="#d4a574"/>
</svg>
